project:
  type: website
  output-dir: docs

website:
  title: "Jacob R. Smith"
  favicon: favicon.png
  site-url: "https://jacob-smith-r.github.io"
  description: "Jacob R. Smith — Ph.D. candidate in economics at Middle Tennessee State University. Public choice, Austrian economics, and historical political economy."
  image: images/aier.jpg
  open-graph: true
  twitter-card:
    creator: "@sosGrayMatter"
    card-style: summary
  navbar:
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "C.V."
        href: cv.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "Research"
        href: research.qmd
      - text: "Papers & Data"
        href: explore.qmd
    right:
      - text: "<i class='ai ai-google-scholar' aria-hidden='true'></i>"
        href: "https://scholar.google.com/citations?hl=en&user=XybWLzwAAAAJ"
        aria-label: Google Scholar
      - text: "<i class='ai ai-orcid' aria-hidden='true'></i>"
        href: "https://orcid.org/0009-0005-7221-3245"
        aria-label: ORCID
      - text: "<i class='ai ai-ssrn' aria-hidden='true'></i>"
        href: "https://papers.ssrn.com/Sol3/Cf_Dev/AbsByAuth.cfm?per_id=7065908"
        aria-label: SSRN
      - icon: github
        href: "https://github.com/jacob-smith-r"
        aria-label: GitHub
      - icon: linkedin
        href: "https://www.linkedin.com/in/jacobsmithr"
        aria-label: LinkedIn
      - icon: envelope
        href: "mailto:jacob.rand.smith@gmail.com"
        aria-label: Email
  page-footer:
    center: "© 2026 Jacob R. Smith"

format:
  html:
    theme:
      light: [cosmo, theme.scss]
      dark: [darkly, theme-dark.scss]
    toc: false
    link-external-newwindow: true
    include-in-header: header.html
    grid:
      body-width: 880px
